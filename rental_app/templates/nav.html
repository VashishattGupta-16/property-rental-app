                                   <a href="{% url 'rental_list' %}?type=SHOWROOM" class="dropdown-item">Shops</a>
                                   <a href="{% url 'rental_list' %}?type=APARTMENT" class="dropdown-item">Apartments</a>
                                   <a href="{% url 'rental_list' %}?type=INDUSTRIAL_PLOT" class="dropdown-item">Plots</a>
                                   <a href="{% url 'rental_list' %}?type=HOUSE" class="dropdown-item">Houses</a>
                               </div>
                           </div>

                           <hr class="dropdown-sep">

                           <!-- RENT -->
                           <div class="accordion">
                               <button class="accordion-btn" type="button" aria-expanded="false">
                                   <span>Rent</span>
                                   <i class="fa-solid fa-chevron-down"></i>
                               </button>
                               <div class="accordion-content" hidden>
                                   <a href="{% url 'rental_list' %}?type=1BHK" class="dropdown-item">1 BHK</a>
                                   <a href="{% url 'rental_list' %}?type=2BHK" class="dropdown-item">2 BHK</a>
                                   <a href="{% url 'rental_list' %}?type=3BHK" class="dropdown-item">3 BHK</a>

                           </div>

                           <hr class="dropdown-sep">

                           <a href="{% url 'about' %}" class="dropdown-item">About Us</a>
                       </div>
                    </div>
                </div>

                <!-- Logo -->
                <a href="{% url 'index' %}" class="logo-wrap">

            <!-- ======================================

                    <button class="dropdown-trigger" type="button">

                    <div class="dropdown-menu desktop-dropdown-menu">
                        <div class="dropdown-card">
                            <a href="{% url 'rental_list' %}?type=VILLA" class="dropdown-item">Villas</a>
                            <a href="{% url 'rental_list' %}?type=SHOWROOM" class="dropdown-item">Commercial Shops</a>
                            <a href="{% url 'rental_list' %}?type=APARTMENT" class="dropdown-item">Apartments</a>

            <!-- ======================================
                 RIGHT: Auth & Profile
            ======================================= -->

                {% if user.is_authenticated %}
                    
                    <!-- Profile Dropdown -->
                    <div class="dropdown-container">

                        <!-- Added profile-dropdown-menu class for right alignment -->

                                </a>

                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item logout-btn">

                            </div>

                    <a href="{% url 'account_login' %}" class="login-link">Login</a>
                    <a href="{% url 'account_signup' %}" class="join-btn">Sign Up</a>

                {% endif %}
            </div>

        </div>
    </div>
</nav>

<!-- JavaScript to toggle Dropdowns (Mobile menu & Profile menu) -->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const dropdownBtns = document.querySelectorAll('.js-dropdown-btn');

    function closeAllDropdowns() {
        document.querySelectorAll('.js-dropdown-menu').forEach(menu => {
            menu.classList.remove('show-dropdown');
        });
        dropdownBtns.forEach(btn => btn.setAttribute('aria-expanded', 'false'));
    }

    dropdownBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation(); // Stop click from hitting the document
            
            // Close all other open dropdowns first
            dropdownBtns.forEach(otherBtn => {
                if (otherBtn === btn) return;
                const otherMenu = otherBtn.nextElementSibling;
                if (otherMenu) otherMenu.classList.remove('show-dropdown');
                otherBtn.setAttribute('aria-expanded', 'false');
            });

            // Toggle the menu right next to this button
            const menu = btn.nextElementSibling;
            if (menu) {
                menu.classList.toggle('show-dropdown');
                btn.setAttribute('aria-expanded', menu.classList.contains('show-dropdown') ? 'true' : 'false');
            }
        });
    });

    // Close dropdowns if clicking anywhere outside
    document.addEventListener('click', (e) => {
        if (e.target.closest('.dropdown-container')) return;
        closeAllDropdowns();
    });

    // Close on Escape for accessibility
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        closeAllDropdowns();
    });

    // Mobile accordion inside the menu
    document.querySelectorAll('.accordion-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const accordion = btn.closest('.accordion');
            const content = accordion?.querySelector('.accordion-content');
            if (!content) return;

            const isOpen = btn.getAttribute('aria-expanded') === 'true';
            btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
            content.toggleAttribute('hidden', isOpen);
        });
    });
});
</script>
