<style>
    .dropdown-item {
        display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1.25rem;
        font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em;
        text-transform: uppercase; color: #cbd5e1; transition: all 0.2s ease;
    }
    .dropdown-item:hover { background: #0ea5e9; color: white; }

    /* JS Toggled Classes */
    .show-menu { opacity: 1 !important; visibility: visible !important; transform: translateY(0) !important; }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Function to handle toggling
        const setupDropdown = (selector, triggerSelector, menuSelector) => {
            const containers = document.querySelectorAll(selector);
            containers.forEach(container => {
                const trigger = container.querySelector(triggerSelector);
                const menu = container.querySelector(menuSelector);
                
                trigger.addEventListener('click', (e) => {
                    if (window.innerWidth < 1024 || selector === '.dropdown-mobile') {
                        e.preventDefault();
                        e.stopPropagation();
                        // Close all others
                        document.querySelectorAll('.nav-menu, .mobile-menu').forEach(m => {
                            if (m !== menu) m.classList.remove('show-menu');
                        });
                        menu.classList.toggle('show-menu');
                    }
                });
            });
        };

        setupDropdown('.dropdown-container', '.nav-btn', '.nav-menu');
        setupDropdown('.dropdown-mobile', '.mobile-toggle', '.mobile-menu');

        // Close on outside click
        document.addEventListener('click', () => {
            document.querySelectorAll('.nav-menu, .mobile-menu').forEach(m => m.classList.remove('show-menu'));
        });
    });
</script>
