{% load static %}

<link rel="stylesheet" href="{% static 'css/navbar.css' %}">

<nav class="navbar-wrapper">

            <!-- ======================================

                    </button>

                    <div

                            >
                                Explore
                            </a>

                            <a
                                href="{% url 'about' %}"

                            <hr class="dropdown-divider">

                            <!-- ACQUIRE -->
                            <div class="accordion">

                                <button
                                    class="accordion-btn"
                                    type="button"
                                >
                                    <span>Acquire</span>

                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>

                                <div class="accordion-content">

                                    <a
                                        href="{% url 'rental_list' %}?type=VILLA"
                                        class="dropdown-item"
                                    >

                                    </a>

                                    <a
                                        href="{% url 'rental_list' %}?type=SHOWROOM"
                                        class="dropdown-item"
                                    >
                                        Shops
                                    </a>

                                    <a
                                        href="{% url 'rental_list' %}?type=APARTMENT"
                                        class="dropdown-item"
                                    >
                                        Apartments
                                    </a>

                                    <a
                                        href="{% url 'rental_list' %}?type=INDUSTRIAL_PLOT"
                                        class="dropdown-item"
                                    >
                                        Plots
                                    </a>

                                    <a
                                        href="{% url 'rental_list' %}?type=HOUSE"
                                        class="dropdown-item"
                                    >
                                        Houses
                                    </a>

                                </div>

                            </div>

                            <hr class="dropdown-divider">

                            <!-- RENT -->
                            <div class="accordion">

                                <button
                                    class="accordion-btn"
                                    type="button"
                                >
                                    <span>Rent</span>

                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>

                                <div class="accordion-content">

                                    <a
                                        href="{% url 'rental_list' %}?type=1BHK"
                                        class="dropdown-item"
                                    >
                                        1 BHK
                                    </a>

                                    <a
                                        href="{% url 'rental_list' %}?type=2BHK"
                                        class="dropdown-item"
                                    >
                                        2 BHK
                                    </a>

                                    <a
                                        href="{% url 'rental_list' %}?type=3BHK"
                                        class="dropdown-item"
                                    >
                                        3 BHK
                                    </a>

                                    <a
                                        href="{% url 'rental_list' %}?type=PG"
                                        class="dropdown-item"
                                    >
                                        PGs
                                    </a>

                                </div>

                            </div>

                            <hr class="dropdown-divider">

                            {% if user.is_authenticated %}

                                <a
                                    href="{% url 'profile' %}"
                                    class="dropdown-item"
                                >
                                    Profile
                                </a>

                                <a
                                    href="{% url 'wishlist' %}"
                                    class="dropdown-item"
                                >
                                    Wishlist
                                </a>

                                <a
                                    href="{% url 'rental_create' %}"
                                    class="dropdown-item"
                                >
                                    List Space
                                </a>

                                <hr class="dropdown-divider">

                                <form
                                    method="post"
                                    action="{% url 'account_logout' %}"
                                >
                                    {% csrf_token %}

                                    <button
                                        type="submit"
                                        class="dropdown-item logout-btn"
                                    >
                                        Logout
                                    </button>
                                </form>

                            {% else %}

                                <a
                                    href="{% url 'account_login' %}"
                                    class="dropdown-item"
                                >
                                    Login
                                </a>

                            {% endif %}

                        </div>

                    </div>

                </div>

                <!-- LOGO -->
                <a href="{% url 'index' %}" class="logo-wrap">

                    <h1 class="logo-text">
                        Property<span class="logo-highlight">X</span>
                    </h1>

                </a>

            </div>

            <!-- ======================================
                 CENTER
            ======================================= -->

            <div class="navbar-center">

                <!-- DESKTOP ACQUIRE -->
                <div class="desktop-dropdown">

                    <button
                        class="dropdown-trigger desktop-btn"
                        type="button"
                    >
                        Acquire

                        <i class="fa-solid fa-chevron-down"></i>
                    </button>

                    <div class="desktop-menu">

                        <div class="dropdown-card">

                            <a href="{% url 'rental_list' %}?type=VILLA" class="dropdown-item">
                                Villas
                            </a>

                            <a href="{% url 'rental_list' %}?type=SHOWROOM" class="dropdown-item">
                                Shops
                            </a>

                            <a href="{% url 'rental_list' %}?type=APARTMENT" class="dropdown-item">
                                Apartments
                            </a>

                            <a href="{% url 'rental_list' %}?type=INDUSTRIAL_PLOT" class="dropdown-item">
                                Plots
                            </a>

                            <a href="{% url 'rental_list' %}?type=HOUSE" class="dropdown-item">
                                Houses
                            </a>

                        </div>

                    </div>

                </div>

                <!-- DESKTOP RENT -->
                <div class="desktop-dropdown">

                    <button
                        class="dropdown-trigger desktop-btn"
                        type="button"
                    >
                        Rent

                        <i class="fa-solid fa-chevron-down"></i>
                    </button>

                    <div class="desktop-menu">

                        <div class="dropdown-card">

                            <a href="{% url 'rental_list' %}?type=1BHK" class="dropdown-item">
                                1 BHK
                            </a>

                            <a href="{% url 'rental_list' %}?type=2BHK" class="dropdown-item">
                                2 BHK
                            </a>

                            <a href="{% url 'rental_list' %}?type=3BHK" class="dropdown-item">
                                3 BHK
                            </a>

                            <a href="{% url 'rental_list' %}?type=PG" class="dropdown-item">
                                PGs
                            </a>

                        </div>

                    </div>

                </div>

                <a href="{% url 'about' %}" class="nav-link">
                    About
                </a>

            </div>

        </div>

    </div>

</nav>

<script>

document.addEventListener("DOMContentLoaded", () => {

    // =====================================
    // MOBILE MENU
    // =====================================

    const mobileBtn =
        document.getElementById("mobileMenuBtn");

    const mobileMenu =
        document.getElementById("mobileMenu");

    mobileBtn.addEventListener("click", (e) => {

        e.stopPropagation();

        mobileMenu.classList.toggle("show-menu");
    });

    // =====================================
    // ACCORDIONS
    // =====================================

    const accordions =
        document.querySelectorAll(".accordion");

    accordions.forEach((accordion) => {

        const button =
            accordion.querySelector(".accordion-btn");

        const content =
            accordion.querySelector(".accordion-content");

        const icon =
            accordion.querySelector("i");

        button.addEventListener("click", (e) => {

            e.stopPropagation();

            const isOpen =
                accordion.classList.contains("active");

            // CLOSE ALL
            accordions.forEach((item) => {

                item.classList.remove("active");

                item
                    .querySelector(".accordion-content")
                    .style.maxHeight = null;
            });

            // OPEN CURRENT
            if (!isOpen) {

                accordion.classList.add("active");

                content.style.maxHeight =
                    content.scrollHeight + "px";
            }
        });
    });

    // =====================================
    // DESKTOP DROPDOWNS
    // =====================================

    const desktopDropdowns =
        document.querySelectorAll(".desktop-dropdown");

    desktopDropdowns.forEach((dropdown) => {

        const button =
            dropdown.querySelector(".desktop-btn");

        button.addEventListener("click", (e) => {

            e.stopPropagation();

            dropdown.classList.toggle("active");
        });
    });

    // =====================================
    // OUTSIDE CLICK
    // =====================================

    document.addEventListener("click", () => {

        mobileMenu.classList.remove("show-menu");

        desktopDropdowns.forEach((dropdown) => {
            dropdown.classList.remove("active");
        });
    });

});

</script>
