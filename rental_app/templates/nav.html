<script>
document.addEventListener("DOMContentLoaded", () => {

    // =========================================
    // HELPERS
    // =========================================

    const closeAllDropdowns = () => {
        document.querySelectorAll(".dropdown-menu").forEach(menu => {
            menu.classList.remove("show-dropdown");
        });
    };

    const closeAllAccordions = () => {
        document.querySelectorAll(".mobile-accordion-content").forEach(content => {
            content.style.maxHeight = null;
            content.classList.remove("accordion-open");

            const trigger = content.previousElementSibling;
            const arrow = trigger.querySelector(".fa-chevron-down");

            trigger.classList.remove("mobile-accordion-active");

            if (arrow) {
                arrow.classList.remove("rotate-180");
            }
        });
    };

    // =========================================
    // DROPDOWN SETUP
    // =========================================

    const setupDropdown = (buttonId, menuId) => {

        const button = document.getElementById(buttonId);
        const menu = document.getElementById(menuId);

        if (!button || !menu) return;

        button.addEventListener("click", (e) => {
            e.stopPropagation();

            const isOpen = menu.classList.contains("show-dropdown");

            closeAllDropdowns();

            if (!isOpen) {
                menu.classList.add("show-dropdown");
            }
        });
    };

    // Mobile Menu
    setupDropdown("mobileMenuButton", "mobileDropdownMenu");

    // Profile Menu
    setupDropdown("profileMenuButton", "profileDropdownMenu");

    // =========================================
    // DESKTOP DROPDOWNS
    // =========================================

    const desktopDropdowns = document.querySelectorAll(".desktop-dropdown");

    desktopDropdowns.forEach(dropdown => {

        const trigger = dropdown.querySelector(".desktop-trigger");
        const menu = dropdown.querySelector(".desktop-dropdown-menu");

        if (!trigger || !menu) return;

        trigger.addEventListener("click", (e) => {
            e.stopPropagation();

            const isOpen = menu.classList.contains("show-dropdown");

            closeAllDropdowns();

            if (!isOpen) {
                menu.classList.add("show-dropdown");
            }
        });
    });

    // =========================================
    // MOBILE ACCORDIONS
    // =========================================

    const accordionTriggers = document.querySelectorAll(".mobile-accordion-trigger");

    accordionTriggers.forEach(trigger => {

        trigger.addEventListener("click", (e) => {

            e.stopPropagation();

            const content = trigger.nextElementSibling;
            const arrow = trigger.querySelector(".fa-chevron-down");

            if (!content) return;

            const isOpen = content.classList.contains("accordion-open");

            // Close all first
            closeAllAccordions();

            // Open current if previously closed
            if (!isOpen) {

                content.classList.add("accordion-open");

                content.style.maxHeight =
                    content.scrollHeight + "px";

                trigger.classList.add("mobile-accordion-active");

                if (arrow) {
                    arrow.classList.add("rotate-180");
                }
            }
        });
    });

    // =========================================
    // OUTSIDE CLICK CLOSE
    // =========================================

    document.addEventListener("click", (e) => {

        const clickedInsideDropdown =
            e.target.closest(".dropdown-container");

        if (!clickedInsideDropdown) {
            closeAllDropdowns();
        }
    });

});
</script>
