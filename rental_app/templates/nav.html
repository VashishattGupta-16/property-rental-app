{% load static %}
<link rel="stylesheet" href="{% static 'css/navbar.css' %}">

<nav class="navbar-wrapper">
    <div class="navbar-shell">
        <div class="navbar-grid">

            <!-- ======================================
                 LEFT: Mobile Menu & Logo
            ======================================= -->
            <div class="navbar-left">
                
                <!-- Mobile Only Menu -->
                <div class="dropdown-container mobile-dropdown">
                    <button class="dropdown-trigger js-dropdown-btn" type="button" aria-label="Menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="dropdown-menu js-dropdown-menu">
                        <div class="dropdown-card">
                            <a href="{% url 'rental_list' %}" class="dropdown-item">Explore Market</a>
                            <a href="{% url 'rental_list' %}?type=VILLA" class="dropdown-item">Villas & Houses</a>
                            <a href="{% url 'rental_list' %}?type=APARTMENT" class="dropdown-item">Apartments</a>
                            <a href="{% url 'rental_list' %}?type=PG" class="dropdown-item">PGs & Co-living</a>
                            <a href="{% url 'about' %}" class="dropdown-item">About Us</a>
                        </div>
                    </div>
                </div>

                <!-- Logo -->
                <a href="{% url 'index' %}" class="logo-wrap">
                    <h1 class="logo-text">Property<span class="logo-highlight">X</span></h1>
                </a>
            </div>

            <!-- ======================================
                 CENTER: Desktop Navigation
            ======================================= -->
            <div class="navbar-center">
                
                <a href="{% url 'rental_list' %}" class="nav-link">Explore</a>

                <!-- Desktop Acquire Dropdown -->
                <div class="dropdown-container desktop-dropdown">
                    <button class="dropdown-trigger" type="button">
                        Acquire <i class="fa-solid fa-chevron-down dropdown-arrow"></i>
                    </button>
                    <div class="dropdown-menu desktop-dropdown-menu">
                        <div class="dropdown-card">
                            <a href="{% url 'rental_list' %}?type=VILLA" class="dropdown-item">Villas</a>
                            <a href="{% url 'rental_list' %}?type=SHOWROOM" class="dropdown-item">Commercial Shops</a>
                            <a href="{% url 'rental_list' %}?type=APARTMENT" class="dropdown-item">Apartments</a>
                            <a href="{% url 'rental_list' %}?type=INDUSTRIAL_PLOT" class="dropdown-item">Plots</a>
                        </div>
                    </div>
                </div>

                <!-- Desktop Rent Dropdown -->
                <div class="dropdown-container desktop-dropdown">
                    <button class="dropdown-trigger" type="button">
                        Rent <i class="fa-solid fa-chevron-down dropdown-arrow"></i>
                    </button>
                    <div class="dropdown-menu desktop-dropdown-menu">
                        <div class="dropdown-card">
                            <a href="{% url 'rental_list' %}?type=1BHK" class="dropdown-item">1 BHK</a>
                            <a href="{% url 'rental_list' %}?type=2BHK" class="dropdown-item">2 BHK</a>
                            <a href="{% url 'rental_list' %}?type=PG" class="dropdown-item">PGs</a>
                        </div>
                    </div>
                </div>

                <a href="{% url 'about' %}" class="nav-link">About</a>
            </div>

            <!-- ======================================
                 RIGHT: Auth & Profile
            ======================================= -->
            <div class="navbar-right">
                {% if user.is_authenticated %}
                    
                    <!-- Profile Dropdown -->
                    <div class="dropdown-container">
                        <button class="dropdown-trigger js-dropdown-btn" style="padding: 0; border: none; background: transparent;">
                            <div class="profile-avatar">
                                <!-- Get first letter of username -->
                                {{ user.username|make_list|first|upper }}
                            </div>
                        </button>
                        
                        <!-- Added profile-dropdown-menu class for right alignment -->
                        <div class="dropdown-menu profile-dropdown-menu js-dropdown-menu">
                            <div class="dropdown-card">
                                <a href="{% url 'profile' %}" class="dropdown-item">
                                    <i class="fa-solid fa-user"></i> My Profile
                                </a>
                                <a href="{% url 'wishlist' %}" class="dropdown-item">
                                    <i class="fa-solid fa-heart"></i> Wishlist
                                </a>
                                <a href="{% url 'rental_create' %}" class="dropdown-item">
                                    <i class="fa-solid fa-plus"></i> List Space
                                </a>
                                <hr style="border-color: var(--nav-border); margin: 0.5rem 0;">
                                
                                <form method="post" action="{% url 'account_logout' %}">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item logout-btn">
                                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                {% else %}
                    
                    <a href="{% url 'account_login' %}" class="login-link">Login</a>
                    <a href="{% url 'account_signup' %}" class="join-btn">Sign Up</a>

                {% endif %}
            </div>

        </div>
    </div>
</nav>

<!-- JavaScript to toggle Dropdowns (Mobile menu & Profile menu) -->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const dropdownBtns = document.querySelectorAll('.js-dropdown-btn');

    dropdownBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation(); // Stop click from hitting the document
            
            // Close all other open dropdowns first
            document.querySelectorAll('.js-dropdown-menu').forEach(menu => {
                if (menu !== btn.nextElementSibling) {
                    menu.classList.remove('show-dropdown');
                }
            });

            // Toggle the menu right next to this button
            const menu = btn.nextElementSibling;
            if (menu) {
                menu.classList.toggle('show-dropdown');
            }
        });
    });

    // Close dropdowns if clicking anywhere outside
    document.addEventListener('click', () => {
        document.querySelectorAll('.js-dropdown-menu').forEach(menu => {
            menu.classList.remove('show-dropdown');
        });
    });
});
</script>
