{% comment %}
This footer has been refactored to use Tailwind CSS and align with the project's design system,
resolving the conflict with the previous Bootstrap/MDB-styled component.
{% endcomment %}
<footer class="mt-auto py-10 border-t border-[var(--surface-border)] text-center text-sm text-[var(--text-muted)]">

    <!-- Social Media Links -->
    <div class="flex justify-center gap-4 mb-6">
        <a href="#" aria-label="Facebook"
            class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--surface)] hover:bg-sky-500 hover:text-white transition-colors">
            <i class="fab fa-facebook-f"></i>
        </a>
        <a href="#" aria-label="Twitter"
            class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--surface)] hover:bg-sky-500 hover:text-white transition-colors">
            <i class="fab fa-twitter"></i>
        </a>
        <a href="#" aria-label="Instagram"
            class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--surface)] hover:bg-sky-500 hover:text-white transition-colors">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="#" aria-label="LinkedIn"
            class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--surface)] hover:bg-sky-500 hover:text-white transition-colors">
            <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="#" aria-label="GitHub"
            class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--surface)] hover:bg-sky-500 hover:text-white transition-colors">
            <i class="fab fa-github"></i>
        </a>
    </div>

    <!-- Copyright -->
    <p>&copy; {% now "Y" %} The Residence Co Services. All rights reserved.</p>
</footer>
