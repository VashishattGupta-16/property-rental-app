{% extends base_template|default:"layout.html" %}

{% block title %}Offline | Empire Estate{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6 py-16">
  <div class="max-w-xl w-full glass-card rounded-3xl p-10 border border-white/10 text-center">
    <h1 class="text-3xl md:text-4xl font-black text-white">You’re offline</h1>
    <p class="mt-3 text-slate-300">
      This page is available offline. Check your internet connection and try again.
    </p>
    <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
      <button
        type="button"
        onclick="location.reload()"
        class="px-6 py-3 rounded-xl bg-blue-600 text-white font-black hover:bg-blue-500 transition"
      >
        Retry
      </button>
      <a
        href="/"
        class="px-6 py-3 rounded-xl bg-white/5 text-white font-black border border-white/10 hover:bg-white/10 transition"
      >
        Go Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
