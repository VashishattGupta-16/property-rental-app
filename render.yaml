# 1. Databases are declared in their own top-level list
databases:
  - name: rentalpro-db
    plan: free
    databaseName: rental_db
    user: rental_admin # 🌟 Changed from "postgres" to a valid custom username
# 2. Services (Web apps, workers, etc.) are declared here
services:
  - type: web
    name: rentalpro-web
    plan: free
    runtime: python
    buildCommand: |
      set -e
      # Fix potential windows encoding issue with requirements.txt
      # and remove hashes to prevent mismatch errors in CI/CD.
      python - <<'PY'
      import re
      from pathlib import Path
      p = Path('requirements.txt')
      if p.exists():
          raw = p.read_bytes()
          try:
              content = raw.decode('utf-8')
          except UnicodeDecodeError:
              content = raw.decode('utf-16')
          new_content = re.sub(r'\\\s+--hash=\S+', '', content)
          p.write_text(new_content, encoding='utf-8')
      PY
      pip install -r requirements.txt
      npm install
      npm run build:css
      python manage.py collectstatic --no-input
    startCommand: "python manage.py migrate --no-input && gunicorn rental_app.wsgi:application --config gunicorn.conf.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DJANGO_SETTINGS_MODULE
        value: rental_app.settings
      - key: DJANGO_DEBUG
        value: "False"

      # This links securely to the database block declared above
      - key: DATABASE_URL
        fromDatabase:
          name: rentalpro-db
          property: connectionString

      # Cloudinary Credentials (values input via Render Dashboard)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Google Social Auth Credentials
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # Security Keys
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
