{# Wishlist toggle form fragment — full form replaces existing form via HTMX #}
<form action="{% url 'toggle_wishlist' rental.id %}" method="POST" class="js-wishlist-form"
    hx-post="{% url 'toggle_wishlist' rental.id %}" hx-target="this" hx-swap="outerHTML" hx-boost="false">
    {% csrf_token %}

    <button type="submit" data-wishlisted="{{ is_wishlisted|yesno:'1,0' }}"
        aria-pressed="{{ is_wishlisted|yesno:'true,false' }}"
        aria-label="{% if is_wishlisted %}Remove from wishlist{% else %}Save to wishlist{% endif %}"
        title="{% if is_wishlisted %}Saved{% else %}Save{% endif %}" class="wishlist-btn flex items-center justify-center w-9 h-9 rounded-full
                   transition-all duration-200 focus:outline-none focus:ring-2
                   focus:ring-offset-2 focus:ring-red-400
                   {% if is_wishlisted %}
                     bg-red-50 text-red-500 hover:bg-red-100
                   {% else %}
                     bg-white/80 text-gray-400 hover:text-red-500 hover:bg-red-50
                   {% endif %}">
        {% if is_wishlisted %}
        <i class="ti ti-heart-filled text-lg" aria-hidden="true"></i>
        {% else %}
        <i class="ti ti-heart text-lg" aria-hidden="true"></i>
        {% endif %}
    </button>
</form>
