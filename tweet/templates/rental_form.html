{% extends "layout.html" %}
{% load media_urls %}

{% block content %}
<!-- Premium Glass-morphism Styling -->
<style>
    .glass-card {
        background: rgba(17, 24, 39, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .royal-input input, .royal-input select, .royal-input textarea {
        background: transparent !important;
        border: none !important;
        color: white !important;
        width: 100%;
        outline: none !important;
    }
    .input-wrapper {
        background: rgba(31, 41, 55, 0.5);
        border: 1px solid rgba(75, 85, 99, 0.4);
        transition: all 0.3s ease;
    }
    .input-wrapper:focus-within {
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
</style>

<div class="max-w-5xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
    
    <!-- HEADER -->
    <div class="mb-12 flex justify-between items-end">
        <div>
            <p class="text-blue-500 font-semibold tracking-widest uppercase text-xs mb-2">Management Portal</p>
            <h1 class="text-5xl font-extrabold text-white tracking-tight">
                {% if form.instance.pk %} Edit <span class="text-blue-500">Property</span> {% else %} Create <span class="text-blue-500">Listing</span> {% endif %}
            </h1>
        </div>
        <a href="{% url 'rental_list' %}" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center gap-2 mb-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg> Back to List
        </a>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-8">
        {% csrf_token %}
        {{ formset.management_form }}

        <!-- SECTION 1: CORE DETAILS -->
        <div class="glass-card rounded-3xl p-8">
            <div class="flex items-center gap-3 mb-8">
                <div class="p-2 bg-blue-600/20 rounded-lg text-blue-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9Normally I can help with things like this, but I don't seem to have access to that content. You can try again or ask me for something else.
