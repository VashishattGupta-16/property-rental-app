{% extends base_template %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] px-6">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-lg text-center">

        <h3 class="text-2xl font-bold text-slate-800 mb-4">Confirm Deletion</h3>
        <p class="text-slate-600 mb-8">Are you sure you want to delete this rental post? This action cannot be undone.</p>
        <form method="post" class="flex justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'rental_list' %}" class="px-6 py-3 rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold transition-colors">Cancel</a>
            <button type="submit" class="px-6 py-3 rounded-lg bg-red-500 hover:bg-red-600 text-white font-bold transition-colors">Yes, delete</button>
        </form>
    </div>
</div>
{% endblock %}
